name: farvixo_all
description: "Farvixo Tools — One Platform. Infinite Tools. Powered by AI."
publish_to: 'none'

version: 1.0.0-rc.1+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Backend (guarded init — app runs without keys)
  supabase_flutter: ^2.8.0

  # Firebase (farvixo-production-2026) — NO firebase_auth (Supabase is auth SoT)
  firebase_core: ^3.15.2
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  firebase_messaging: ^15.2.10
  firebase_remote_config: ^5.5.0
  firebase_app_check: ^0.3.2+10
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Biometric authentication
  local_auth: ^2.3.0
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  device_info_plus: ^11.3.0

  # On-device tool processing (Phase 5A — local engines)
  file_picker: ^8.1.6            # pick PDFs / files for tools
  image: ^4.3.0                  # pure-Dart image compress/resize/convert/rotate
  syncfusion_flutter_pdf: ^27.2.5 # pure-Dart PDF merge/split/compress/protect
  share_plus: ^10.1.3            # export / share tool results
  crypto: ^3.0.6                 # local MD5 / SHA hashing
  qr_flutter: ^4.1.0             # local QR-code PNG generation
  zxing2: ^0.2.3                 # pure-Dart QR decoding (QR Scanner tool)
  mobile_scanner: ^7.0.1         # live camera QR scanning (viewfinder)
  hive: ^2.2.3                   # local scan-history store (encrypted box)
  hive_flutter: ^1.1.0           # Hive init + Flutter integration
  flutter_local_notifications: ^18.0.1 # display foreground FCM + local pushes

  # PDF Converter (OOXML writers + page rasterization)
  ffmpeg_kit_flutter_new: any    # video/audio codecs for the media tool engines
  archive: ^4.0.2                # ZIP for DOCX / XLSX / PPTX / multi-page image packs
  xml: ^6.5.0                    # Office Open XML part builders
  pdfrx: ^2.1.3                  # PDFium page → bitmap (JPG/PNG/WebP/PPTX)
  desktop_drop: ^0.5.0           # desktop / window file drag-and-drop
  swipelab_webp: ^1.0.0          # native libwebp encode (RGBA → WebP)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/logo/farvixo_logo.png
    # app_icon_1024.png is macOS/Xcode only — not bundled in mobile APK
