# Farvixo Flutter CI — runs on every push and pull request.
#
# NOTE: GitHub reads workflows from the REPOSITORY ROOT. This repo's root is
# the parent folder (Farvixo/), so move this file to:
#   Farvixo/.github/workflows/flutter_ci.yml
# The `working-directory: Flutter` lines below already account for that.

name: Flutter CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: Flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting-safe analysis (zero issues allowed)
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: Flutter/coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Debug APK build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality

    defaults:
      run:
        working-directory: Flutter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
